<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘의 꿀템 레시피</title>
<link href="https://hangeul.pstatic.net/hangeul_static/css/nanum-ganginhan-wiro.css" rel="stylesheet">
<style>
body{
    margin:0;
    padding:20px;
    background:#edf3ee;
    font-family:'Pretendard', sans-serif;
    color:#222;
}

.container{
    max-width:700px;
    margin:auto;
}

.notice{
    text-align:center;
    color:#777;
    font-size:14px;
    margin-bottom:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.recipe{
    text-align:center;
}

.recipe h1{
    margin:10px 0;
}

.subtitle{
    color:#58a66b;
    font-weight:bold;
}

.section-title{
    font-size:24px;
    font-weight:bold;
    margin-bottom:15px;
}

.tip{
    background:#e4f4e8;
    padding:15px;
    border-radius:15px;
    margin-top:10px;
}

.button{
    display:block;
    text-align:center;
    background:#ff8c42;
    color:white;
    text-decoration:none;
    padding:18px;
    border-radius:15px;
    font-weight:bold;
    margin-top:20px;
}

.footer{
    text-align:center;
    color:#888;
    margin-top:30px;
}
</style>

</head>
<body>

<div class="container">

<div class="notice">
쿠팡 파트너스 활동의 일환으로 일정 수수료를 제공받습니다.
</div>

<div class="recipe">
<h3 class="recipe-label"> RECIPE</br>
<h1 class="recipe-title">🥒 오 이 요 거 트</h1>
<p class="subtitle">시원하고 중독성 있는 여름 조합 💚</p>
</div>

<div class="card">
<div class="section-title">🛒 준비물</div>

<p>
오이 1개<br>
플레인 요거트 3큰술<br>
후추<br>
알룰로스 1스푼
</p>

<a href="#" class="button">
재료 보러가기
</a>
</div>

<div class="card">
<div class="section-title">👩‍🍳 만드는 법</div>

<p>1. 오이를 얇게 썰어주세요.</p>
<p>2. 소금을 뿌려 10분 절여주세요.</p>
<p>3. 물기를 제거해주세요.</p>
<p>4. 요거트와 알룰로스를 섞어주세요.</p>
<p>5. 오이와 버무리면 완성!</p>

<div class="tip">
💡 물기를 충분히 제거하면 훨씬 맛있어요.
</div>
</div>

<div class="card">
<div class="section-title">💚 추천 재료</div>

<p>
제가 실제 사용한 재료를 확인해보세요.
</p>

<a href="#" class="button">
쿠팡 바로가기
</a>
</div>

<div class="footer">
오늘의 꿀템
</div>

</div>

</body>
</html>
